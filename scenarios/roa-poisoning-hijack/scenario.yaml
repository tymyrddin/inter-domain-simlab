# Scenario: ROA poisoning to manufacture cover for a hijack.
# Not one of the nine op-red-lantern runbook techniques; a trust-fabric-tamper
# sequence that produces the ROA-poisoning, multi-stage telemetry bundle heimdallr
# correlates. Deployable on M1-M4 + the registry (M3); no new nodes, no overlay.
name: roa-poisoning-hijack
title: Pulling the Roots             # working title; heimdallr fixture, not a runbook technique
technique: roa-poisoning
overlay: null

roles:
  attacker: attacker-as              # AS65020, Bracket Hosting, the routing half
  victim: victim-as                  # FDEI, AS65010, owns the signed 203.0.113.0/24
  registry: registry-ca              # FMDA's CA; the ROA is tampered here (the trust half)
  transit_unfiltered: transit-b
  collector: observer

target:
  legitimate_prefix: 203.0.113.0/24
  legitimate_origin: 65010
  hijack_prefix: 203.0.113.0/25
  hijack_origin: 65020

# Multi-stage: ROV is on (Toadstool Takeover already fails). Arm by withdrawing the
# cover, then hijack. The arming shows in the RPKI/ROA telemetry; the hijack in the
# scorer timeline. The two correlated files are the fixture.
stages:
  - arm: on the registry workstation, the player withdraws FDEI's ROA via Krill's API with the planted token (bin/poison), so 203.0.113.0/24 goes signed -> not-found
  - hijack: pivot to the foothold and announce 203.0.113.0/25 as AS65020; now not-found, so ROV permits it

# Player entry (bastion -> Phase-1 box). Two positions: the registry workstation to
# tamper with Krill (the trust half), then a pivot to the foothold for the announce.
# Granted compromised-CA position: a planted Krill token stands in for the abstracted
# credential compromise.
position:
  start_box: ops-host               # the registry-attacker workstation, reaches Krill's API over regpub
  loot: krill-token                 # planted by the session manager; the player uses it themselves
  pivot: attacker-as                # after arming, foothold to announce

posture:
  rov: on
  irr: off
  roa: baseline                     # FDEI signed at start; the player withdraws it

rootme_flag: "IDSL{pulling-the-roots-cover-restored}"

flag_condition:
  mode: propagation
  rpki_state: notfound               # manufactured: the /25 is invalid under the ROA, not-found after poisoning
  check: >
    With ROV on, 203.0.113.0/25 origin 65020 reaches the observer only after the player
    withdraws FDEI's ROA from Krill (bin/poison on the workstation); before that, ROV
    drops it as invalid.
  telemetry_bundle: >
    The heimdallr fixture is the raw bundle: events.jsonl (the /25 surfacing as a BMP
    announce after the arming), the validator log and VRP set, and the ROA-change
    records (the withdrawal). heimdallr correlates the arming with the hijack itself.
