# Krill (registry-ca / FMDA), testbed mode: the lab's own self-contained RPKI
# trust anchor, no internet (PLAN.md section 17 decision 4). The testbed section
# makes Krill stand up a built-in TA, a publication server and an open child
# registration, so init-ca.sh can onboard the FMDA CA and sign ROAs for the lab
# prefixes. admin_token is replaced from $KRILL_ADMIN_TOKEN by start.sh.
#
# The FQDN (fmda-ca.lab) is what the cert and the published URIs use; the lab has
# no DNS, so Routinator carries a hosts entry for it (see routinator start.sh).

ip          = "0.0.0.0"
port        = 3000
admin_token = "replaced-at-start-from-env"
service_uri = "https://fmda-ca.lab:3000/"
data_dir    = "/var/krill/data"
log_type    = "stderr"
log_level   = "info"

[testbed]
rrdp_base_uri = "https://fmda-ca.lab:3000/rrdp/"
rsync_jail    = "rsync://fmda-ca.lab/repo/"
ta_aia        = "rsync://fmda-ca.lab/ta/ta.cer"
ta_uri        = "https://fmda-ca.lab:3000/ta/ta.cer"
