# rsyncd for the lab RPKI repository. Routinator retrieves the trust anchor and
# the published objects over rsync (no TLS), the canonical RPKI transport, since
# Krill's self-signed RRDP/HTTPS cert is not usable for trust-anchor retrieval.
#
#   repo  Krill's published objects (manifests, CRLs, certs, ROAs), matching
#         rsync_jail = rsync://fmda-ca.lab/repo/.
#   ta    the trust-anchor certificate, matching ta_aia =
#         rsync://fmda-ca.lab/ta/ta.cer. init-ca.sh writes ta.cer here.

uid = root
gid = root
use chroot = no
max connections = 20

[repo]
    path = /var/krill/data/repo/rsync/current
    read only = yes

[ta]
    path = /var/krill/data/ta-rsync
    read only = yes
