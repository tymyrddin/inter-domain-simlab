# registry-rtr (Routinator). Validates against the lab's own Krill testbed TA
# only, no internet (PLAN.md section 17). The single local TAL is placed by
# start.sh and selected with --no-rir-tals --extra-tals-dir on the command line.

repository-dir = "/tmp/rpki-cache"

# RTR to the transits; HTTP for status/metrics (operator only, not published).
rtr-listen  = ["0.0.0.0:3323"]
http-listen = ["0.0.0.0:8323"]

# Validate over rsync, not RRDP. Krill's RRDP is HTTPS with a self-signed cert
# that Routinator will not use for trust-anchor retrieval, so the lab serves the
# repository and TA cert over rsync (registry-ca runs rsyncd). RRDP off.
disable-rrdp = true
