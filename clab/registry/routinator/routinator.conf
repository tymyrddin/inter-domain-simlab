# registry-rtr (Routinator). Validates against the lab's own Krill testbed TA
# only, no internet. The single local TAL is placed by
# start.sh and selected with --no-rir-tals --extra-tals-dir on the command line.

repository-dir = "/tmp/rpki-cache"

# RTR to the transits; HTTP for status/metrics (operator only, not published).
rtr-listen  = ["0.0.0.0:3323"]
http-listen = ["0.0.0.0:8323"]

# Fast base loop: re-validate every 30s instead of the 600s default, so a ROA
# change is picked up within half a minute even if nobody nudges Routinator.
# min-refresh defaults to refresh, so this one key sets the cadence. `ctl roa`
# still fires a SIGUSR1 for instant pickup; this just makes the unattended cadence
# lab-friendly. Cheap here: the repository is local and tiny.
refresh = 30

# Native RRDP over Krill's HTTPS. Two things are needed together, neither of them
# the obvious "trust the cert":
#   - allow-dubious-hosts: Routinator refuses RRDP to "dubious" hosts by default,
#     and fmda-ca.lab -> 10.0.0.33 (RFC1918) is one, so without this it skips the
#     fetch entirely ("Dubious host name. Not using the repository"). A host-policy
#     rejection, not a trust failure, so no amount of cert config fixes it.
#   - rrdp-root-certs: Routinator is static rustls and ignores SSL_CERT_FILE and the
#     OS ca-certificates bundle, so this is the only way to trust the lab's root CA
#     (the FMDA Lab Root CA, staged into /share by init-ca.sh). That root signs the
#     fmda-ca.lab server leaf Krill serves; rustls validates leaf -> root. rustls
#     will not accept a self-signed cert that is also the server leaf, which is why
#     krill/start.sh mints a proper root+leaf chain rather than one self-signed cert.
# Repository and TA cert both flow over RRDP/HTTPS; rsync stays configured as the
# fallback, so VRPs load even if RRDP is unavailable.
# To force rsync-only instead: set `disable-rrdp = true` and drop the two lines below.
rrdp-root-certs = ["/share/krill-https.pem"]
allow-dubious-hosts = true
