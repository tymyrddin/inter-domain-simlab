# seed, AS65003. GoBGP global config. Peers eBGP with both transits and feeds
# them a replayed MRT dump (see start.sh). No inbound/outbound policy here: the
# dump is pre-filtered (seeds/mrt/filter.py) and the transits carry an inbound
# prefix-list as a second layer, so the seed stays a plain announcer.
#
# eth1 = transit-a (10.0.0.24/30), eth2 = transit-b (10.0.0.28/30). The
# addresses are assigned by the clab exec block, not by GoBGP.

[global.config]
  as = 65003
  router-id = "10.0.0.26"

[[neighbors]]
  [neighbors.config]
    neighbor-address = "10.0.0.25"
    peer-as = 65001
    description = "transit-a"

[[neighbors]]
  [neighbors.config]
    neighbor-address = "10.0.0.29"
    peer-as = 65002
    description = "transit-b"
