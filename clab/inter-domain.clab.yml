# inter-domain-simlab, milestone 1.5: deployable core plus the player layer.
#
# Five all-FRR autonomous systems plus two traffic hosts (milestone 1), and on
# top a thin player surface (milestone 1.5): an attacker ops host the player
# enters, and a player-facing looking glass. One base topology, no per-zone
# split: the subject is an inter-AS mesh whose whole point is that everything
# connects. Scenarios that need more than this add nodes via overlay files.
#
# Two planes of access:
#   Operator (god-mode): host `docker exec` and `./ctl` reach every node and the
#     observer's omniscient table. Routers keep their mgmt eth0 flushed and are
#     driven by docker exec, exactly as in milestone 1.
#   Player (constrained): enters the ops host over the internal access LAN
#     (100.64.0.0/24, reachable from the operator host's bridge address, never a
#     published port), then SSHes in-band to the foothold (attacker-as) and reads
#     the looking glass. Key-only auth throughout; see ctl for key generation.
#
# Addressing:
#   transit-a eth1 <-> transit-b eth1     10.0.0.0/30    a=.1  b=.2
#   transit-a eth2 <-> victim-as eth1     10.0.0.4/30    a=.5  victim=.6
#   transit-b eth2 <-> attacker-as eth1   10.0.0.8/30    b=.9  attacker=.10
#   transit-a eth3 <-> observer eth1      10.0.0.12/30   a=.13 ob=.14
#   transit-b eth3 <-> observer eth2      10.0.0.16/30   b=.17 ob=.18
#   transit-a eth5 <-> lookingglass eth2  10.0.0.20/30   a=.21 lg=.22
#   transit-a eth6 <-> seed eth1          10.0.0.24/30   a=.25 seed=.26
#   transit-b eth4 <-> seed eth2          10.0.0.28/30   b=.29 seed=.30
#   registry services segment             10.0.0.32/28   registry-ca=.33
#     (idsl_services bridge)                             registry-rtr=.34
#                                                        transit-a=.35 transit-b=.36
#   observer eth3 <-> bmp-collector eth1  10.0.0.48/30   ob=.49 bmp=.50
#   victim-as eth2 <-> web eth1           203.0.113.0/24 victim=.1 web=.10
#   transit-a eth4 <-> eyeball eth1       192.0.2.0/24   a=.1   eyeball=.10
#   access LAN (idsl_access bridge)       100.64.0.0/24  attacker-as=.1
#                                                        ops-host=.10 lg=.20
#                                                        operator host=.254

name: inter-domain

topology:

  defaults:
    kind: linux
    # Strip the clab management IP from eth0 so each node carries no route off
    # the lab (contained: no internet egress). docker exec still reaches every
    # node. ops-host has no eth0 (network-mode: none), so the flush is a no-op
    # there and the error is swallowed.
    exec:
      - sh -c "ip addr flush dev eth0 2>/dev/null || true"

  nodes:

    # ── Access LAN ──────────────────────────────────────────────────────
    # A host Linux bridge (created by ./ctl up, which also gives the operator
    # host 100.64.0.254 on it). It carries no NAT and no default, so it adds
    # reachability without adding egress.
    idsl_access: { kind: bridge }

    # Registry services segment (10.0.0.32/28): the transits reach Routinator's
    # RTR and Routinator reaches Krill's publication point over this. Internal,
    # no NAT, no egress; created by ./ctl up alongside idsl_access.
    idsl_services: { kind: bridge }

    # ── Backbone and edge ASes (all FRR, one image) ─────────────────────
    transit-a:
      image: clab-router
      binds:
        - ../configs/daemons:/etc/frr/daemons
        - ../configs/transit-a.conf:/etc/frr/frr.conf
      labels: { role: transit, asn: "65001", func: LIR, lore: FungusFiber }

    transit-b:
      image: clab-router
      binds:
        - ../configs/daemons:/etc/frr/daemons
        - ../configs/transit-b.conf:/etc/frr/frr.conf
      labels: { role: transit, asn: "65002", func: "ISP (tier-1 upstream)", lore: Hyphalink }

    victim-as:
      image: clab-router
      binds:
        - ../configs/daemons:/etc/frr/daemons
        - ../configs/victim-as.conf:/etc/frr/frr.conf
      labels: { role: victim, asn: "65010", func: "content (gov portal)", lore: FDEI }

    # The foothold. admin's authorized_keys (the lab access key) is bind-mounted
    # here and nowhere else among the transits, so the player can SSH in only to
    # the AS they own. Key-only: no working password lives in the image.
    attacker-as:
      image: clab-router
      binds:
        - ../configs/daemons:/etc/frr/daemons
        - ../configs/attacker-as.conf:/etc/frr/frr.conf
        - ../access/authorized_keys:/home/admin/.ssh/authorized_keys:ro
      labels: { role: attacker, asn: "65020", func: customer, lore: "Bracket Hosting" }

    observer:
      image: clab-router
      binds:
        - ../configs/daemons:/etc/frr/daemons
        - ../configs/observer.conf:/etc/frr/frr.conf
      labels: { role: collector, asn: "65000", func: "collector (operator/scorer)", lore: MycoSec }

    # BMP monitoring station (M4 increment 2). The observer's FRR connects out to
    # it and streams its RIB (BMP is router-to-station); it parses route-monitoring
    # into the lab event envelope and writes events.jsonl into the shared /out,
    # which the scorer reads (./ctl score ... bmp). MycoSec's, like the observer.
    bmp-collector:
      image: idsl-bmp-collector
      binds:
        - ../access/bmp:/out
      cap-add: [NET_ADMIN]
      labels: { role: collector, func: "BMP station", lore: MycoSec }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.0.0.50/30 dev eth1 && ip link set eth1 up"

    # The backbone seed. The one GoBGP node: it replays a filtered, sampled real
    # MRT dump (seeds/mrt/) as genuine eBGP UPDATEs to both transits, so the
    # table is plausibly large. Stands in for "the rest of the default-free
    # zone". Real origins, real AS_PATHs; the seed-to-first-hop adjacency is a
    # named, deliberate abstraction (PLAN.md section 13). SEED_COUNT is the scale
    # dial; the committed sample makes the default deploy work offline. GoBGP has
    # no zebra, so the exec block assigns eth1/eth2.
    seed:
      image: idsl-seed
      binds:
        - ../seeds/mrt/seed.sample.mrt:/seeds/seed.sample.mrt:ro
      env:
        SEED_COUNT: ${SEED_COUNT:=10000}
      labels: { role: seed, asn: "65003", func: "transit (global feed)" }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1 && ip link show eth2 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.0.0.26/30 dev eth1 && ip link set eth1 up && ip addr add 10.0.0.30/30 dev eth2 && ip link set eth2 up"

    # Player-facing looking glass. Single-transit vantage, read-only. Only the
    # glass user's authorized_keys is bound (and glass is ForceCommand-locked to
    # one `show ip bgp`), so a player can read its table and nothing more.
    lookingglass:
      image: clab-router
      binds:
        - ../configs/daemons:/etc/frr/daemons
        - ../configs/lookingglass.conf:/etc/frr/frr.conf
        - ../access/authorized_keys:/home/glass/.ssh/authorized_keys:ro
      labels: { role: collector, asn: "65005", func: "collector (public vantage)", lore: OpenHands }

    # ── Registry and governance (FMDA, M3) ──────────────────────────────
    # The lab's own RPKI trust fabric, self-contained (no internet). registry-ca
    # (Krill) is the CA plus testbed trust anchor; registry-rtr (Routinator)
    # validates against it and serves VRPs to the transits over RTR. They share
    # ../access/registry (mounted /share) for the TAL and Krill's RRDP cert.
    # ./ctl rpki-init onboards the FMDA CA and ROAs; ./ctl rov on|off applies
    # origin validation on the transits. None speaks BGP, so none carries an asn.
    registry-ca:
      image: idsl-registry-ca
      env:
        KRILL_ADMIN_TOKEN: ${KRILL_TOKEN:=changeme-lab-token}
      binds:
        - ../access/registry:/share
      cap-add: [NET_ADMIN]
      labels: { role: registry, func: "RIR (Krill CA)", lore: FMDA }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 10.0.0.33/28 dev eth1 && ip link set eth1 up"

    registry-rtr:
      image: idsl-registry-rtr
      binds:
        - ../access/registry:/share
      cap-add: [NET_ADMIN]
      labels: { role: registry, func: "RIR (Routinator/RTR)", lore: FMDA }

    # ── Player entry ────────────────────────────────────────────────────
    # network-mode: none means no mgmt eth0 at all; the only interface is eth1
    # on the access LAN. player_authorized_keys holds the cohort key(s); the lab
    # access key is staged at /run/lab-key for the foothold/lg pivots.
    ops-host:
      image: idsl-ops-host
      network-mode: none
      labels: { role: host, func: "host (attacker workstation)", lore: "Bracket Hosting" }
      binds:
        - ../access/player_authorized_keys:/home/player/.ssh/authorized_keys:ro
        - ../lab-key:/run/lab-key:ro
      cap-add: [NET_ADMIN, NET_RAW]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 100.64.0.10/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 100.64.0.1"

    # ── Traffic plane ───────────────────────────────────────────────────
    web:
      image: wbitt/network-multitool:latest
      labels: { role: host, func: content-host, lore: FDEI }
      binds:
        - ../configs/web/index.html:/usr/share/nginx/html/index.html:ro
      cap-add: [NET_ADMIN]
      env: { HTTP_PORT: "80" }
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 203.0.113.10/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 203.0.113.1"

    eyeball:
      image: wbitt/network-multitool:latest
      labels: { role: client, func: eyeball }
      cap-add: [NET_ADMIN]
      exec:
        - sh -c "n=0; until ip link show eth1 >/dev/null 2>&1; do n=$((n+1)); [ $n -ge 30 ] && break; sleep 1; done; ip addr add 192.0.2.10/24 dev eth1 && ip link set eth1 up"
        - sh -c "ip route replace default via 192.0.2.1"

  links:
    - endpoints: [transit-a:eth1, transit-b:eth1]      # 10.0.0.0/30  core peer
    - endpoints: [transit-a:eth2, victim-as:eth1]      # 10.0.0.4/30  customer
    - endpoints: [transit-b:eth2, attacker-as:eth1]    # 10.0.0.8/30  customer
    - endpoints: [transit-a:eth3, observer:eth1]       # 10.0.0.12/30 collector
    - endpoints: [transit-b:eth3, observer:eth2]       # 10.0.0.16/30 collector
    - endpoints: [observer:eth3, bmp-collector:eth1]   # 10.0.0.48/30 BMP feed
    - endpoints: [transit-a:eth5, lookingglass:eth2]   # 10.0.0.20/30 collector
    - endpoints: [transit-a:eth6, seed:eth1]           # 10.0.0.24/30 seed peer
    - endpoints: [transit-b:eth4, seed:eth2]           # 10.0.0.28/30 seed peer
    # registry services segment 10.0.0.32/28 (RPKI: RTR + publication fetch)
    - endpoints: [registry-ca:eth1,  idsl_services:is0]  # 10.0.0.33
    - endpoints: [registry-rtr:eth1, idsl_services:is1]  # 10.0.0.34
    - endpoints: [transit-a:eth7,    idsl_services:is2]  # 10.0.0.35
    - endpoints: [transit-b:eth5,    idsl_services:is3]  # 10.0.0.36
    - endpoints: [victim-as:eth2, web:eth1]            # 203.0.113.0/24
    - endpoints: [transit-a:eth4, eyeball:eth1]        # 192.0.2.0/24
    # access LAN: foothold, player workstation and looking glass share a bridge
    - endpoints: [attacker-as:eth2,  idsl_access:ia0]  # 100.64.0.1
    - endpoints: [ops-host:eth1,     idsl_access:ia1]  # 100.64.0.10
    - endpoints: [lookingglass:eth1, idsl_access:ia2]  # 100.64.0.20