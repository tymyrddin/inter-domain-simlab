! attacker-as, AS65020. The player's foothold. A customer of transit-b that
! legitimately holds 198.51.100.0/24 (its hosting space) and announces it
! normally. The baseline config is clean: the hijack is not pre-loaded. The
! player SSHes in, drops to `configure terminal`, and announces a more-specific
! of the victim's prefix by hand, e.g.
!
!   conf t
!   router bgp 65020
!    address-family ipv4 unicast
!     network 203.0.113.0/25
!
! 198.51.100.0/24 lives on the loopback so it is always in the RIB for the
! `network` statement to advertise, no host container needed.
!
! eth0 = clab mgmt (flushed at boot). eth1 = transit-b. eth2 = the attacker's
! own access LAN, where the ops host (the player's workstation) and the looking
! glass sit. The player SSHes in over eth2 (admin -> vtysh); the foothold's sshd
! listens on every interface, so flushing the mgmt eth0 does not affect it.
frr defaults traditional
hostname attacker-as
service password-encryption
!
interface lo
 description attacker hosting space
 ip address 198.51.100.1/24
exit
!
interface eth1
 description transit-b-upstream 10.0.0.8/30
 ip address 10.0.0.10/30
exit
!
interface eth2
 description attacker-ops-lan 100.64.0.0/24
 ip address 100.64.0.1/24
exit
!
router bgp 65020
 bgp router-id 10.0.0.10
 no bgp ebgp-requires-policy
 neighbor 10.0.0.9 remote-as 65002
 neighbor 10.0.0.9 description transit-b-upstream
 address-family ipv4 unicast
  network 198.51.100.0/24
 exit-address-family
exit
!
enable password idsl-router
!
end