! lookingglass, AS65005. The player-facing route collector, a stand-in for a
! public RIS/RouteViews vantage. It peers a single transit (transit-a), so its
! view is one provider's best paths, not the gamemaster's two-feed omniscient
! table. Read-only: a deny-all outbound route-map means it announces nothing and
! can never become a transit. Players query it as the `glass` user, whose sshd
! ForceCommand runs one `show ip bgp` (see clab/frr/sshd_config).
!
! eth0 = clab mgmt (flushed at boot). eth1 = access LAN (player queries here),
! eth2 = transit-a peering.
frr defaults traditional
hostname OpenHands-LG
service password-encryption
!
interface eth1
 description access-lan player-facing 100.64.0.0/24
 ip address 100.64.0.20/24
exit
!
interface eth2
 description transit-a 10.0.0.20/30
 ip address 10.0.0.22/30
exit
!
router bgp 65005
 bgp router-id 10.0.0.22
 no bgp ebgp-requires-policy
 neighbor 10.0.0.21 remote-as 65001
 neighbor 10.0.0.21 description transit-a-partial-vantage
 address-family ipv4 unicast
  neighbor 10.0.0.21 route-map RM-DENY-OUT out
 exit-address-family
exit
!
! A collector advertises nothing. Receives transit-a's table, announces none of
! it back.
route-map RM-DENY-OUT deny 10
!
enable password idsl-router
!
end