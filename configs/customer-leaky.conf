! customer-leaky, AS65030. Mudflat Networks, a small multi-homed regional ISP and a
! customer of both transit-a and transit-b. Poorly run: the kind of network where a
! copy-pasted config or a "temporary" exception leaks routes between its providers.
! It holds 198.18.0.0/24 and, by default, announces only that to its upstreams (a
! valley-free good citizen). The route-leak scenario is a player on this box adding a
! stray prefix to its export, so a route learned from transit-a is re-announced to
! transit-b, which prefers the customer path on local-pref. The leaked route then
! behaves like a hijack even though no origin was forged.
!
! eth0 = clab mgmt (flushed). eth1 = transit-a, eth2 = transit-b, eth3 = access LAN
! (the player's SSH path to this compromised router; admin lands in vtysh).
frr defaults traditional
hostname Mudflat-Edge
service password-encryption
!
interface lo
 description mudflat space
 ip address 198.18.0.1/24
exit
!
interface eth1
 description transit-a-upstream 10.0.0.52/30
 ip address 10.0.0.54/30
exit
!
interface eth2
 description transit-b-upstream 10.0.0.56/30
 ip address 10.0.0.58/30
exit
!
interface eth3
 description mgmt-access-lan 100.64.0.0/24
 ip address 100.64.0.30/24
exit
!
router bgp 65030
 bgp router-id 10.0.0.54
 no bgp ebgp-requires-policy
 neighbor 10.0.0.53 remote-as 65001
 neighbor 10.0.0.53 description transit-a-upstream
 neighbor 10.0.0.57 remote-as 65002
 neighbor 10.0.0.57 description transit-b-upstream
 address-family ipv4 unicast
  network 198.18.0.0/24
  ! Valley-free export: announce only our own space to both upstreams. The leak is
  ! a player adding a stray prefix to PL-LEAKY-OUT, so a route learned from one
  ! upstream is re-announced to the other and transit-b prefers the customer path.
  neighbor 10.0.0.53 route-map LEAKY-OUT out
  neighbor 10.0.0.57 route-map LEAKY-OUT out
 exit-address-family
exit
!
ip prefix-list PL-LEAKY-OUT seq 5 permit 198.18.0.0/24
!
route-map LEAKY-OUT permit 10
 match ip address prefix-list PL-LEAKY-OUT
exit
!
enable password idsl-router
!
end
