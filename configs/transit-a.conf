! transit-a, AS65001. Tier-1/2 provider. Peers settlement-free with transit-b,
! is upstream to victim-as (AS65010), and feeds the observer collector. Also
! the gateway for the eyeball client segment (192.0.2.0/24).
!
! eth0 = clab mgmt (flushed at boot). eth1 = transit-b, eth2 = victim-as,
! eth3 = observer, eth4 = eyeball, eth5 = lookingglass collector,
! eth6 = seed (the MRT backbone injector, AS65003),
! eth7 = registry services segment (RPKI RTR to Routinator/FMDA),
! eth8 = customer-leaky (AS65030, the multi-homed leaky ISP).
frr defaults traditional
hostname FungusFiber-Core
service password-encryption
!
interface eth1
 description transit-b 10.0.0.0/30
 ip address 10.0.0.1/30
exit
!
interface eth2
 description victim-as 10.0.0.4/30
 ip address 10.0.0.5/30
exit
!
interface eth3
 description observer 10.0.0.12/30
 ip address 10.0.0.13/30
exit
!
interface eth4
 description eyeball 192.0.2.0/24
 ip address 192.0.2.1/24
exit
!
interface eth5
 description lookingglass 10.0.0.20/30
 ip address 10.0.0.21/30
exit
!
interface eth6
 description seed 10.0.0.24/30
 ip address 10.0.0.25/30
exit
!
interface eth7
 description registry-services 10.0.0.32/28
 ip address 10.0.0.35/28
exit
!
interface eth8
 description customer-leaky 10.0.0.52/30
 ip address 10.0.0.53/30
exit
!
! Deliberately permissive core: `no bgp ebgp-requires-policy` lets routes flow
! without inbound/outbound route-maps, so a bogus announcement propagates the
! way an unfiltered provider would carry it. That is the attack surface.
router bgp 65001
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 neighbor 10.0.0.2 remote-as 65002
 neighbor 10.0.0.2 description transit-b-peer
 neighbor 10.0.0.6 remote-as 65010
 neighbor 10.0.0.6 description victim-as-customer
 neighbor 10.0.0.14 remote-as 65000
 neighbor 10.0.0.14 description observer-collector
 neighbor 10.0.0.22 remote-as 65005
 neighbor 10.0.0.22 description lookingglass-collector
 neighbor 10.0.0.26 remote-as 65003
 neighbor 10.0.0.26 description seed-backbone
 neighbor 10.0.0.54 remote-as 65030
 neighbor 10.0.0.54 description customer-leaky-customer
 address-family ipv4 unicast
  network 192.0.2.0/24
  ! The seed replays a real, pre-filtered dump. This inbound prefix-list is the
  ! second isolation layer (filter.py is the first): it cannot announce the lab's
  ! own blocks (each with le 32, so no more-specific slips through) or bogons, so
  ! the background table can never shadow the victim/attacker prefixes. It only
  ! constrains the seed; the permissive customer/peer behaviour is untouched.
  neighbor 10.0.0.26 prefix-list PL-SEED-IN in
 exit-address-family
exit
!
ip prefix-list PL-SEED-IN seq 5 deny 0.0.0.0/8 le 32
ip prefix-list PL-SEED-IN seq 10 deny 10.0.0.0/8 le 32
ip prefix-list PL-SEED-IN seq 15 deny 100.64.0.0/10 le 32
ip prefix-list PL-SEED-IN seq 20 deny 127.0.0.0/8 le 32
ip prefix-list PL-SEED-IN seq 25 deny 169.254.0.0/16 le 32
ip prefix-list PL-SEED-IN seq 30 deny 172.16.0.0/12 le 32
ip prefix-list PL-SEED-IN seq 35 deny 192.0.2.0/24 le 32
ip prefix-list PL-SEED-IN seq 40 deny 192.168.0.0/16 le 32
ip prefix-list PL-SEED-IN seq 45 deny 198.18.0.0/15 le 32
ip prefix-list PL-SEED-IN seq 50 deny 198.51.100.0/24 le 32
ip prefix-list PL-SEED-IN seq 55 deny 203.0.113.0/24 le 32
ip prefix-list PL-SEED-IN seq 60 deny 224.0.0.0/4 le 32
ip prefix-list PL-SEED-IN seq 65 deny 240.0.0.0/4 le 32
ip prefix-list PL-SEED-IN seq 100 permit 0.0.0.0/0 le 32
!
! RPKI: hold an RTR session to Routinator (FMDA, registry-rtr) and download the
! validated payloads. This only fetches VRPs; it does not act on them. Origin
! validation (ROV) is the RM-ROV-IN route-map below, applied to neighbours only
! when a scenario turns it on (./ctl rov on), so the core stays permissive by
! default. See PLAN.md section 17. retry_interval is dropped from the 600s default
! to 15s so a cold start (Routinator not yet serving when bgpd loads this) heals on
! its own within seconds; ctl up still does an rpki reset for instant VRPs.
rpki
 rpki retry_interval 15
 rpki cache 10.0.0.34 3323 preference 1
exit
!
! ROV policy (defined, not applied by default): drop RPKI-invalid routes, let
! valid and not-found through. `./ctl rov on` binds this inbound on the eBGP
! neighbours; `./ctl rov off` removes it.
route-map RM-ROV-IN deny 10
 match rpki invalid
exit
route-map RM-ROV-IN permit 20
exit
!
! Local-preference policy (defined, not applied by default): mark customer-learned
! routes preferred (200) over peer and seed routes (the default 100). `./ctl localpref
! on` binds this inbound on the customer neighbours; off removes it. Used by the
! route-leak and policy-trust-abuse scenarios, where a route wins on policy, not
! specificity or path length. Never bound at once with RM-ROV-IN (those scenarios
! run ROV off), so the single inbound-route-map slot is never contended.
route-map RM-LP-CUSTOMER permit 10
 set local-preference 200
exit
!
enable password idsl-router
!
end