! victim-as, AS65010. The target. A single-homed customer of transit-a that
! legitimately owns and originates 203.0.112.0/22 (its allocation) and the more
! specific 203.0.113.0/24 the web service sits behind. The false-origin scenario
! steals a more-specific of the /24; the legitimate-peering scenario steals a /24
! elsewhere in the /22, so the covering block shows the rest still routing here.
! The /22 is a discard (Null0) covering route; only 203.0.113.0/24 is populated.
!
! eth0 = clab mgmt (flushed at boot). eth1 = transit-a, eth2 = web segment.
frr defaults traditional
hostname FDEI-Edge
service password-encryption
!
interface eth1
 description transit-a-upstream 10.0.0.4/30
 ip address 10.0.0.6/30
exit
!
interface eth2
 description web 203.0.113.0/24
 ip address 203.0.113.1/24
exit
!
! Covering allocation, advertised as the whole /22. Discard route so the network
! statement has a RIB entry; 203.0.113.0/24 (connected on eth2) carries the hosts.
ip route 203.0.112.0/22 Null0
!
router bgp 65010
 bgp router-id 10.0.0.6
 no bgp ebgp-requires-policy
 neighbor 10.0.0.5 remote-as 65001
 neighbor 10.0.0.5 description transit-a-upstream
 address-family ipv4 unicast
  network 203.0.112.0/22
  network 203.0.113.0/24
 exit-address-family
exit
!
enable password idsl-router
!
end