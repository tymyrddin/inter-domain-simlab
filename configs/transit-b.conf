! transit-b, AS65002. Tier-1/2 provider. Peers settlement-free with transit-a,
! is upstream to attacker-as (AS65020, the player's foothold), and feeds the
! gamemaster collector. It transits the attacker's announcements unfiltered.
!
! eth0 = clab mgmt (flushed at boot). eth1 = transit-a, eth2 = attacker-as,
! eth3 = gamemaster, eth4 = seed (the MRT backbone injector, AS65003),
! eth5 = registry services segment (RPKI RTR to Routinator/FMDA).
frr defaults traditional
hostname Hyphalink-Core
service password-encryption
!
interface eth1
 description transit-a 10.0.0.0/30
 ip address 10.0.0.2/30
exit
!
interface eth2
 description attacker-as 10.0.0.8/30
 ip address 10.0.0.9/30
exit
!
interface eth3
 description gamemaster 10.0.0.16/30
 ip address 10.0.0.17/30
exit
!
interface eth4
 description seed 10.0.0.28/30
 ip address 10.0.0.29/30
exit
!
interface eth5
 description registry-services 10.0.0.32/28
 ip address 10.0.0.36/28
exit
!
! No filtering: whatever attacker-as announces, transit-b accepts and re-
! advertises to transit-a and the collector. This is what makes the
! false-origin hijack reach the wider table.
router bgp 65002
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description transit-a-peer
 neighbor 10.0.0.10 remote-as 65020
 neighbor 10.0.0.10 description attacker-as-customer
 neighbor 10.0.0.18 remote-as 65000
 neighbor 10.0.0.18 description gamemaster-collector
 neighbor 10.0.0.30 remote-as 65003
 neighbor 10.0.0.30 description seed-backbone
 address-family ipv4 unicast
  ! Second isolation layer for the seed (filter.py is the first): it cannot
  ! announce the lab's own blocks (each le 32) or bogons, so the replayed
  ! background table never shadows the victim/attacker prefixes. Constrains the
  ! seed only; the unfiltered transit of the attacker's announcements is intact.
  neighbor 10.0.0.30 prefix-list PL-SEED-IN in
 exit-address-family
exit
!
ip prefix-list PL-SEED-IN seq 5 deny 0.0.0.0/8 le 32
ip prefix-list PL-SEED-IN seq 10 deny 10.0.0.0/8 le 32
ip prefix-list PL-SEED-IN seq 15 deny 100.64.0.0/10 le 32
ip prefix-list PL-SEED-IN seq 20 deny 127.0.0.0/8 le 32
ip prefix-list PL-SEED-IN seq 25 deny 169.254.0.0/16 le 32
ip prefix-list PL-SEED-IN seq 30 deny 172.16.0.0/12 le 32
ip prefix-list PL-SEED-IN seq 35 deny 192.0.2.0/24 le 32
ip prefix-list PL-SEED-IN seq 40 deny 192.168.0.0/16 le 32
ip prefix-list PL-SEED-IN seq 45 deny 198.18.0.0/15 le 32
ip prefix-list PL-SEED-IN seq 50 deny 198.51.100.0/24 le 32
ip prefix-list PL-SEED-IN seq 55 deny 203.0.113.0/24 le 32
ip prefix-list PL-SEED-IN seq 60 deny 224.0.0.0/4 le 32
ip prefix-list PL-SEED-IN seq 65 deny 240.0.0.0/4 le 32
ip prefix-list PL-SEED-IN seq 100 permit 0.0.0.0/0 le 32
!
! RPKI: RTR session to Routinator (FMDA, registry-rtr) for VRPs. Fetch only;
! ROV is the RM-ROV-IN route-map, applied to neighbours only by ./ctl rov on.
rpki
 rpki cache 10.0.0.34 3323 preference 1
exit
!
route-map RM-ROV-IN deny 10
 match rpki invalid
exit
route-map RM-ROV-IN permit 20
exit
!
enable password idsl-router
!
end