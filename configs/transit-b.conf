! transit-b, AS65002. Tier-1/2 provider. Peers settlement-free with transit-a,
! is upstream to attacker-as (AS65020, the player's foothold), and feeds the
! gamemaster collector. It transits the attacker's announcements unfiltered.
!
! eth0 = clab mgmt (flushed at boot). eth1 = transit-a, eth2 = attacker-as,
! eth3 = gamemaster.
frr defaults traditional
hostname transit-b
service password-encryption
!
interface eth1
 description transit-a 10.0.0.0/30
 ip address 10.0.0.2/30
exit
!
interface eth2
 description attacker-as 10.0.0.8/30
 ip address 10.0.0.9/30
exit
!
interface eth3
 description gamemaster 10.0.0.16/30
 ip address 10.0.0.17/30
exit
!
! No filtering: whatever attacker-as announces, transit-b accepts and re-
! advertises to transit-a and the collector. This is what makes the
! false-origin hijack reach the wider table.
router bgp 65002
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description transit-a-peer
 neighbor 10.0.0.10 remote-as 65020
 neighbor 10.0.0.10 description attacker-as-customer
 neighbor 10.0.0.18 remote-as 65000
 neighbor 10.0.0.18 description gamemaster-collector
exit
!
enable password idsl-router
!
end