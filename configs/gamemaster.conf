! gamemaster, AS65000. The only observer in an attack-only lab. Peers eBGP with
! both transits and receives their full tables, but announces nothing: a
! deny-all outbound route-map makes it a passive collector that can never leak
! one provider's routes to the other. `show ip bgp [json]` here is the looking
! glass and the scorer's structured feed (see ./ctl table / ./ctl lg).
!
! `no bgp ebgp-requires-policy` is still required, otherwise eBGP routes with no
! inbound policy would be rejected and the collector would see an empty table.
!
! eth0 = clab mgmt (flushed at boot). eth1 = transit-a, eth2 = transit-b.
frr defaults traditional
hostname gamemaster
service password-encryption
!
interface eth1
 description transit-a 10.0.0.12/30
 ip address 10.0.0.14/30
exit
!
interface eth2
 description transit-b 10.0.0.16/30
 ip address 10.0.0.18/30
exit
!
router bgp 65000
 bgp router-id 10.0.0.14
 no bgp ebgp-requires-policy
 neighbor 10.0.0.13 remote-as 65001
 neighbor 10.0.0.13 description transit-a
 neighbor 10.0.0.17 remote-as 65002
 neighbor 10.0.0.17 description transit-b
 address-family ipv4 unicast
  neighbor 10.0.0.13 route-map RM-DENY-OUT out
  neighbor 10.0.0.17 route-map RM-DENY-OUT out
 exit-address-family
exit
!
! Announce nothing in either direction. The collector is read-only.
route-map RM-DENY-OUT deny 10
!
enable password idsl-router
!
end